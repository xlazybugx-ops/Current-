<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<meta name="theme-color" content="#1a3a2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VEDRIVE">
<title>VEDRIVE — Договор</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --g:#1a3a2a;--g2:#2d5a3d;--gl:#e8f0eb;
  --a:#c47a10;--al:#fef4e0;
  --ink:#111;--sub:#555;--muted:#888;
  --border:#cdd6d0;--bg:#f4f6f5;--card:#fff;
  --red:#b83225;
  --r:13px;--rs:9px;
  --sh:0 1px 5px rgba(0,0,0,.07),0 2px 10px rgba(0,0,0,.05);
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
  background:var(--bg);color:var(--ink);font-size:16px;line-height:1.45;
  -webkit-font-smoothing:antialiased;padding-bottom:calc(65px + var(--safe-b))}
input,select,textarea,button{font-family:inherit;font-size:16px}

.hero{background:linear-gradient(145deg,var(--g) 0%,var(--g2) 120%);
  color:#fff;padding:calc(var(--safe-t)+16px) 16px 14px;
  border-radius:0 0 16px 16px;box-shadow:0 2px 14px rgba(0,0,0,.2)}
.hero-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{font-size:22px;font-weight:800;letter-spacing:2px}
.brand-sub{font-size:11.5px;opacity:.72;margin-top:1px}
.hero-badge{font-size:12px;background:rgba(255,255,255,.18);padding:4px 10px;
  border-radius:20px;font-weight:700;white-space:nowrap}

.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;
  display:flex;background:rgba(255,255,255,.96);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--border);padding-bottom:var(--safe-b)}
.tab{flex:1;background:none;border:none;padding:7px 2px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  color:var(--muted);font-size:10.5px;font-weight:600;cursor:pointer}
.tab .ic{font-size:20px;line-height:1}
.tab.active{color:var(--g2)}

.wrap{padding:13px 14px 6px;max-width:540px;margin:0 auto}
.sh{font-size:11px;text-transform:uppercase;letter-spacing:.8px;
  color:var(--muted);margin:14px 3px 6px;font-weight:600}
.card{background:var(--card);border-radius:var(--r);padding:14px;
  box-shadow:var(--sh);margin-bottom:11px;border:1px solid var(--border)}

.fld{display:block;margin-bottom:11px}
.fld>label{display:block;font-size:11.5px;color:var(--sub);margin-bottom:4px;font-weight:600}
.fld input,.fld select,.fld textarea{
  width:100%;padding:11px 12px;border:1.5px solid var(--border);
  border-radius:var(--rs);background:var(--card);color:var(--ink);
  outline:none;transition:border-color .15s,box-shadow .15s}
.fld input:focus,.fld select:focus,.fld textarea:focus{
  border-color:var(--g2);box-shadow:0 0 0 3px rgba(45,90,61,.09)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}

.fi{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.fi label{font-size:12px;color:var(--sub);font-weight:600;flex:1;min-width:0}
.fi input{width:120px;text-align:right;padding:9px 11px;border:1.5px solid var(--border);border-radius:var(--rs)}
.fi span{color:var(--muted);font-size:13px;flex-shrink:0}

.opt-row{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)}
.opt-row:last-child{border-bottom:none}
.opt-chk{display:flex;align-items:flex-start;gap:9px;flex:1;cursor:pointer}
.opt-chk input[type=checkbox]{width:20px;height:20px;accent-color:var(--g2);flex:0 0 20px;margin-top:1px}
.opt-lbl{font-size:13px;line-height:1.3}
.opt-lbl small{display:block;font-size:10.5px;color:var(--muted);margin-top:1px}
.opt-row.on .opt-lbl{font-weight:600}
.opt-val{display:flex;align-items:center;gap:3px}
.opt-val input{width:70px;text-align:right;padding:7px 8px;border:1.5px solid var(--border);border-radius:7px;font-size:13.5px}
.opt-val span{color:var(--muted);font-size:12px}

.total-bar{background:var(--g);color:#fff;border-radius:var(--r);padding:12px 14px;margin:9px 0}
.total-bar .r1{display:flex;justify-content:space-between;align-items:baseline}
.total-bar .r1 b{font-size:21px}
.total-bar .r2{display:flex;justify-content:space-between;margin-top:6px;padding-top:6px;
  border-top:1px solid rgba(255,255,255,.15);opacity:.8;font-size:12.5px}

.btn{display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;padding:13px;border:none;border-radius:var(--rs);
  font-weight:700;font-size:15px;margin-bottom:8px;cursor:pointer;
  background:var(--card);color:var(--ink);border:1.5px solid var(--border);
  transition:transform .07s,opacity .12s}
.btn:active{transform:scale(.98);opacity:.87}
.btn.primary{background:var(--g2);color:#fff;border-color:var(--g2);box-shadow:0 3px 10px rgba(45,90,61,.28)}
.btn.amber{background:var(--a);color:#fff;border-color:var(--a)}
.btn.ghost{background:transparent;color:var(--g2);border-color:var(--border)}
.btn.danger{color:var(--red);border-color:#f0c5bf;background:transparent}
.btn.sm{padding:9px 12px;font-size:13px;margin-bottom:6px}
.btn-row{display:flex;gap:8px}
.btn-row .btn{margin-bottom:0}
.lnk{background:none;border:none;color:var(--g2);font-size:12.5px;font-weight:600;padding:3px 5px;cursor:pointer}
.lnk.rd{color:var(--red)}

.num-row{display:flex;align-items:center;gap:5px}
.num-row input{width:64px;text-align:center}
.ns{width:32px;height:32px;border:1.5px solid var(--border);background:#fff;
  border-radius:7px;font-size:17px;color:var(--g2);cursor:pointer;display:grid;place-items:center}

.car-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);
  box-shadow:var(--sh);overflow:hidden;margin-bottom:9px}
.car-photo{width:100%;height:86px;object-fit:cover;display:block;background:#e8e4dc}
.car-body{padding:10px 12px 11px}
.car-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.plate{font-family:"SF Mono",ui-monospace,monospace;font-weight:700;
  background:#f0ead6;color:var(--ink);padding:2px 8px;border-radius:5px;
  font-size:13px;border:1px solid #d8c898}
.cls-b{font-size:9.5px;text-transform:uppercase;font-weight:700;padding:2px 6px;
  border-radius:10px;background:var(--gl);color:var(--g2)}
.car-name{font-weight:700;font-size:14.5px;margin-bottom:6px}
.car-specs{display:flex;flex-wrap:wrap;gap:5px}
.spec{font-size:11px;background:var(--bg);color:var(--sub);padding:2px 7px;border-radius:5px}
.spec b{color:var(--ink)}
.car-acts{display:flex;gap:5px;margin-top:8px;padding-top:7px;border-top:1px solid var(--border)}
.fleet-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
@media(min-width:400px){.fleet-grid{grid-template-columns:repeat(3,1fr)}}

.specs-info{background:var(--gl);border-radius:var(--rs);padding:9px 12px;margin-top:6px}
.specs-info .title{font-size:11.5px;font-weight:700;color:var(--g2);margin-bottom:5px}
.specs-info .rows{display:grid;grid-template-columns:1fr 1fr;gap:3px 10px}
.spec-item{font-size:11.5px;color:var(--sub)}
.spec-item b{color:var(--ink);font-weight:600}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.modal-bg.h{display:none}
.modal-card{background:var(--card);border-radius:18px 18px 0 0;
  width:100%;max-width:520px;max-height:91vh;overflow-y:auto;
  padding:0 0 calc(14px + var(--safe-b));animation:sup .23s ease}
@keyframes sup{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:16px;margin:0;font-weight:700}
.modal-x{background:var(--bg);border:none;width:29px;height:29px;border-radius:50%;font-size:14px;color:var(--sub);cursor:pointer}
.modal-body{padding:13px 15px 0}
.photo-prev{width:100%;height:95px;object-fit:cover;border-radius:var(--rs);margin-bottom:8px;background:#eee;display:block}

#toasts{position:fixed;bottom:calc(75px + var(--safe-b));left:0;right:0;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  pointer-events:none;z-index:200}
.toast{background:var(--g);color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13.5px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.2);
  opacity:0;transform:translateY(7px);transition:all .2s;max-width:88%;text-align:center}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{background:var(--red)}

/* Preview iframe */
#prev-frame{width:100%;height:390px;border:1px solid var(--border);
  border-radius:var(--rs);background:#fff;display:block;margin-top:8px}

#doc-overlay{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;background:#f0ede8}
.dov-head{display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:var(--g);color:#fff;padding:calc(var(--safe-t)+12px) 16px 12px;
  font-size:14px;font-weight:700;flex-shrink:0}
.dov-head span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dov-head button{background:rgba(255,255,255,.2);border:none;color:#fff;
  padding:8px 14px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
.dov-head button:active{background:rgba(255,255,255,.35)}
#dov-frame{flex:1;border:none;width:100%;background:#fff}
.specs-info{background:var(--gl);border-radius:var(--rs);padding:8px 10px;margin:8px 0 4px}
.specs-chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:11px;background:#fff;border:1px solid var(--border);border-radius:6px;
  padding:3px 8px;color:var(--ink);white-space:nowrap;line-height:1.4}
.chip b{color:var(--g2)}
.chip-full{background:var(--al);border-color:#c8a030;color:#7a5800}
.add-car-btn{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.4);
  color:#fff;font-size:13px;font-weight:700;padding:6px 14px;border-radius:20px;cursor:pointer}
.add-car-btn:active{background:rgba(255,255,255,.3)}
.use-car-btn{display:block;width:100%;margin:8px 0 2px;padding:10px;border-radius:8px;
  background:var(--gl);border:1.5px solid #9ac0a8;color:var(--g2);
  font-size:13px;font-weight:700;cursor:pointer;text-align:center}
.use-car-btn:active{background:#c0dcc8}
.spec-full{background:var(--al)!important;border-color:#c8a030!important;color:#7a5800!important}
.clear-wrap{text-align:center;padding:2px 0 18px}
.clear-lnk{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline;padding:6px}
#prev-frame{display:none}
</style>
</head>
<body>
<div id="app"></div>
<div id="toasts"></div>
<div id="car-modal" class="modal-bg h">
  <div class="modal-card">
    <div class="modal-head">
      <h3 id="modal-ttl">Авто</h3>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<script>
const CO={name:"VEDRIVE CO., LTD.",reg:"0835568011721",
  addr:"20/411 Laem Luang Road, Talat Nuea Subdistrict, Mueang Phuket District, Phuket 83000, Thailand",
  ph:"+66945916880",ph2:"+66902099990"};

let DB=JSON.parse(localStorage.getItem("vd7")||"null")||{
  fleet:[
    {id:"c1",plate:"7118",make:"FORD RANGER",cls:"pickup",color:"Белый",hp:170,fuel:"12.5",ins:"standard",deposit:5000,rate:1300,km:45200,photo:""},
    {id:"c2",plate:"7003",make:"MG ZS",cls:"suv",color:"Белый",hp:111,fuel:"7.8",ins:"standard",deposit:5000,rate:650,km:28600,photo:""},
    {id:"c3",plate:"2956",make:"MG 5",cls:"sedan",color:"Белый",hp:114,fuel:"6.8",ins:"standard",deposit:5000,rate:500,km:62100,photo:""},
    {id:"c4",plate:"9205",make:"MG 5",cls:"sedan",color:"Серый",hp:114,fuel:"6.8",ins:"full",deposit:5000,rate:550,km:31400,photo:""},
    {id:"c5",plate:"4891",make:"MG 5",cls:"sedan",color:"Белый",hp:114,fuel:"6.8",ins:"standard",deposit:5000,rate:500,km:47800,photo:""},
    {id:"c6",plate:"3905",make:"MG 5",cls:"sedan",color:"Белый",hp:114,fuel:"6.8",ins:"standard",deposit:5000,rate:500,km:55300,photo:""},
    {id:"c7",plate:"5841",make:"MG 5",cls:"sedan",color:"Чёрный",hp:114,fuel:"6.8",ins:"standard",deposit:5000,rate:550,km:39700,photo:""},
    {id:"c8",plate:"12",make:"MG 5",cls:"sedan",color:"Белый",hp:114,fuel:"6.8",ins:"standard",deposit:5000,rate:550,km:22100,photo:""},
    {id:"c9",plate:"1705",make:"MITSUBISHI ATTRAGE",cls:"sedan",color:"Белый",hp:78,fuel:"5.8",ins:"standard",deposit:5000,rate:500,km:41200,photo:""},
    {id:"c10",plate:"4238",make:"MAZDA 2",cls:"sedan",color:"Белый",hp:90,fuel:"6.0",ins:"standard",deposit:5000,rate:600,km:33900,photo:""},
    {id:"c11",plate:"1552",make:"TOYOTA YARIS",cls:"sedan",color:"Белый",hp:98,fuel:"5.9",ins:"standard",deposit:5000,rate:550,km:29500,photo:""},
  ],
  nextNum:2654
};

function saveDB(){localStorage.setItem("vd7",JSON.stringify(DB));}

// Draft
let D=newDraft();
function newDraft(){return{
  num:DB.nextNum,date:toIso(new Date()),
  lessee:"",passport:"",idl:"",phone:"",hotel:"",
  plate:"",make:"",
  days:"",s_date:"",s_time:"10:00",e_date:"",e_time:"10:00",
  km:"",fuel:"",rent:"",prepay:"0",
  on:{seat:false,booster:false,prov:false,isl:false,full:false,del:false,ret:false,wash:false},
  v:{seat:"500",booster:"300",prov:"",isl:"2000",full:"",del:"500",ret:"500",wash:""},
};}

function toIso(d){return d.toISOString().slice(0,10);}
function fmt(iso){if(!iso)return"_________";const p=iso.split("-");return`${p[2]}.${p[1]}.${p[0]}`;}
function mon(n){if(n===""||n==null||n===undefined)return"";const x=Number(n);return isNaN(x)?"":x.toLocaleString("ru-RU");}
function esc(s){return String(s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));}

function total(){
  let s=Number(D.rent)||0;
  const o=D.on,v=D.v;
  if(o.seat)   s+=Number(v.seat)||500;
  if(o.booster)s+=Number(v.booster)||300;
  if(o.prov)   s+=Number(v.prov)||0;
  if(o.isl)    s+=Number(v.isl)||2000;
  if(o.full)   s+=Number(v.full)||0;
  if(o.del)    s+=Number(v.del)||500;
  if(o.ret)    s+=Number(v.ret)||500;
  if(o.wash)   s+=Number(v.wash)||0;
  s-=Number(D.prepay)||0;
  return s;
}

function toast(msg,k="ok"){
  const t=document.createElement("div");
  t.className="toast "+k;t.textContent=msg;
  document.getElementById("toasts").appendChild(t);
  setTimeout(()=>t.classList.add("show"),10);
  setTimeout(()=>{t.classList.remove("show");setTimeout(()=>t.remove(),280);},2500);
}

// ── VIEWS ──────────────────────────────────────────────────────────────
let V="form";
function go(v){V=v;r();window.scrollTo(0,0);}

function nav(){
  return`<nav class="tabbar">
    <button class="tab ${V==="form"?"active":""}" onclick="go('form')"><span class="ic">📝</span><span>Договор</span></button>
    <button class="tab ${V==="fleet"?"active":""}" onclick="go('fleet')"><span class="ic">🚗</span><span>Автопарк</span></button>
  </nav>`;}

// ── FORM ────────────────────────────────────────────────────────────────
function vForm(){
  const car=DB.fleet.find(c=>c.plate===D.plate);
  const tot=total();
  const OPTS=[
    {k:"seat",   l:"Детское кресло",                     h:"500 ฿"},
    {k:"booster",l:"Детский бустер",                     h:"300 ฿"},
    {k:"prov",   l:"Пакет «Соседние провинции»",          h:"Пханг-Нга, Краби, Каосок"},
    {k:"isl",    l:"Пакет «Острова»",                    h:"Самуи, Панган, Ко Ланта · 2000 ฿"},
    {k:"full",   l:"Страховка «Полное покрытие»",         h:"4000+ ฿"},
    {k:"del",    l:"Доставка авто",                      h:"500–700 ฿ (вне 20:00–8:00 +200)"},
    {k:"ret",    l:"Возврат авто",                       h:"500–700 ฿ (вне 20:00–8:00 +200)"},
    {k:"wash",   l:"Финальная мойка",                    h:"500–700 ฿"},
  ];
  const optRows=OPTS.map(o=>`
    <div class="opt-row ${D.on[o.k]?"on":""}">
      <label class="opt-chk">
        <input type="checkbox" ${D.on[o.k]?"checked":""} onchange="togOpt('${o.k}',this.checked)">
        <span class="opt-lbl">${o.l}<small>${o.h}</small></span>
      </label>
      <div class="opt-val">
        <input type="number" inputmode="numeric" value="${D.v[o.k]}" placeholder="0" style="${D.on[o.k]?"":"opacity:.35"}"
          oninput="setOpt('${o.k}',this.value)">
        <span>฿</span>
      </div>
    </div>`).join("");

  return`
    <header class="hero">
      <div class="hero-row">
        <div><div class="brand">VEDRIVE</div><div class="brand-sub">Договор аренды</div></div>
        <div class="hero-badge">№ ${D.num}</div>
      </div>
    </header>
    <div class="wrap">
      <h3 class="sh">Арендатор</h3>
      <div class="card">
        <div class="fld"><label>ФИО (латиницей)</label>
          <input value="${esc(D.lessee)}" placeholder="IVANOV IVAN" autocapitalize="characters"
            oninput="D.lessee=this.value.toUpperCase();r()"></div>
        <div class="row2">
          <div class="fld"><label>Паспорт</label>
            <input value="${esc(D.passport)}" placeholder="769548373" oninput="D.passport=this.value;r()"></div>
          <div class="fld"><label>МВУ / IDL</label>
            <input value="${esc(D.idl)}" placeholder="99DF533934" oninput="D.idl=this.value;r()"></div>
        </div>
        <div class="row2">
          <div class="fld"><label>Телефон</label>
            <input type="tel" value="${esc(D.phone)}" placeholder="9001234567" oninput="D.phone=this.value;r()"></div>
          <div class="fld"><label>Отель / адрес</label>
            <input value="${esc(D.hotel)}" placeholder="AIRPORT" oninput="D.hotel=this.value;r()"></div>
        </div>
      </div>

      <h3 class="sh">Автомобиль</h3>
      <div class="card">
        <div class="fld"><label>Выбрать из парка</label>
          <select onchange="selCar(this.value)">
            <option value="">— выбрать авто —</option>
            ${DB.fleet.map(c=>`<option value="${c.plate}" ${D.plate===c.plate?"selected":""}>${c.plate} · ${c.make}</option>`).join("")}
          </select></div>
        ${car?`<div class="specs-info">
          <div class="specs-chips">
            ${car.hp?`<span class="chip">&#9889; <b>${car.hp}</b> л.с.</span>`:""}
            ${car.fuel?`<span class="chip">&#9981; <b>${car.fuel}</b> л/100</span>`:""}
            ${car.ins==="full"?`<span class="chip chip-full">&#10022; полное покрытие</span>`:`<span class="chip">станд. страховка</span>`}
            <span class="chip">&#x1F4B0; <b>${mon(car.rate)}</b> ฿/сут</span>
            <span class="chip">&#x1F511; залог <b>${mon(car.deposit)}</b> ฿</span>
            ${car.km?`<span class="chip">&#x1F4CD; ~<b>${car.km.toLocaleString("ru-RU")}</b> км</span>`:""}
          </div>
        </div>`:""}
        <div class="row2" style="margin-top:${car?"10px":"0"}">
          <div class="fld"><label>Пробег при выдаче, км</label>
            <input type="number" inputmode="numeric" value="${esc(D.km)}"
              placeholder="${car&&car.km?car.km:""}"
              oninput="D.km=this.value;r()"></div>

function selCar(plate){
  const car=DB.fleet.find(c=>c.plate===plate);
  D.plate=plate; D.make=car?car.make:"";
  if(car&&car.rate&&D.days) D.rent=String(car.rate*Number(D.days));
  r();
}
function togOpt(k,on){
  D.on[k]=on;
  if(on&&!D.v[k]){const def={seat:"500",booster:"300",prov:"",isl:"2000",full:"",del:"500",ret:"500",wash:""};D.v[k]=def[k];}
  r();
}
function setOpt(k,v){D.v[k]=v;updTotal();}
function adjD(d){D.days=Math.max(0,(Number(D.days)||0)+d);updRent();r();}
function cdays(){
  if(D.s_date&&D.e_date){const ms=new Date(D.e_date)-new Date(D.s_date);if(ms>0){D.days=Math.round(ms/86400000);updRent();}}
}
function updRent(){const car=DB.fleet.find(c=>c.plate===D.plate);if(car&&car.rate)D.rent=String(car.rate*Number(D.days));}
function updTotal(){const el=document.getElementById("tot-disp");if(el)el.textContent=mon(total())+" ฿";}
function clearForm(){D=newDraft();var ov=document.getElementById("doc-overlay");if(ov)ov.remove();r();}

function useCar(id){
  const car=DB.fleet.find(c=>c.id===id);if(!car)return;
  D.plate=car.plate;D.make=car.make;
  if(car.rate&&D.days)D.rent=String(car.rate*Number(D.days));
  go("form");toast(`${car.make} · ${car.plate} выбран`);
}
function delCar(id){
  DB.fleet=DB.fleet.filter(c=>c.id!==id);saveDB();toast("Удалено");r();
}

function prvPhoto(url){
  const p=document.getElementById("mpp");if(!p)return;
  p.outerHTML=url?`<img src="${url}" class="photo-prev" id="mpp" onerror="this.style.display='none'">`:`<div id="mpp"></div>`;
}
function closeModal(){document.getElementById("car-modal").classList.add("h");}
function saveCar(){
  const d={
    id:editId||("c"+Date.now()),
    make:document.getElementById("mp-mk").value.trim(),
    plate:document.getElementById("mp-pl").value.trim(),
    color:document.getElementById("mp-cl").value.trim(),
    cls:document.getElementById("mp-cs").value,
    ins:document.getElementById("mp-in").value,
    hp:Number(document.getElementById("mp-hp").value)||"",
    fuel:document.getElementById("mp-fl").value,
    rate:Number(document.getElementById("mp-rt").value)||500,
    deposit:Number(document.getElementById("mp-dp").value)||5000,
    km:Number(document.getElementById("mp-km").value)||"",
    photo:document.getElementById("mp-ph").value.trim(),
  };
  if(!d.make){toast("Укажите марку","err");return;}
  if(editId){const i=DB.fleet.findIndex(c=>c.id===editId);if(i>=0)DB.fleet[i]=d;}
  else DB.fleet.push(d);
  saveDB();closeModal();toast("Сохранено");r();
}

<p><span class="b">АРЕНДАТОР:</span> ${_v(D.lessee||"_ _ _ _ _ _ _ _ _ _ _ _ _ _ _")}&nbsp; (далее – «Арендатор»), паспорт ${_v(D.passport||"_ _ _ _ _ _ _ _ _")} МВУ ${_v(D.idl||"_ _ _ _ _ _ _ _ _")}</p>
<p>Номер мобильного ${_v(D.phone||"_ _ _ _ _ _ _ _ _ _ _ _")}&nbsp;&nbsp;&nbsp; Отель ${_v(D.hotel||"_ _ _ _ _ _ _ _ _ _ _")}</p>

<span class="sec">1. ПРЕДМЕТ ДОГОВОРА</span>
<p>1.1. Арендодатель обязуется предоставить, а Арендатор принять в аренду автомобиль описанный ниже (далее – «Автомобиль») на условиях, изложенных в настоящем договоре.</p>
<p>1.2. Автомобиль описан следующим образом:</p>
<p>Марка и Модель: «${_v(D.make||"_ _ _ _ _ _ _ _ _")}» ГосНомер: «${_v(D.plate||"_ _ _")}»&nbsp;&nbsp; Пробег: ${_v(D.km||"_ _ _ _ _ _ _ _ _ _")}&nbsp;&nbsp; Бензин: ${_v(D.fuel||"_ _ _ _ _ _ _ _")}</p>

<span class="sec">2. СРОКИ АРЕНДЫ</span>
<p>2.1. Срок аренды Автомобиля составляет ${_v(D.days||"_")} (дней) с ${_v(sd)} по ${_v(ed)}.</p>

<span class="sec">3. АРЕНДНАЯ ПЛАТА И ЗАЛОГ</span>
<p>3.1. Арендатор обязуется уплатить Арендодателю сумму аренды в размере ${_v((D.rent||"_ _ _ _")+" бат")} за весь срок аренды, без дополнительных опций. Оплата за бронирование составила ${_v((D.prepay||"0")+" бат")}. Данная сумма будет зачтена при окончательном расчете в момент получения автомобиля.</p>
<p>3.2. Оплата производится в полном объеме до начала аренды. В случае досрочного возврата перерасчет стоимости аренды не производится.</p>
<p>3.3. Арендатор обязуется внести залог в размере 200$/5000THB в момент заключения договора. Залог возвращается в полном объеме при возврате Автомобиля в том же состоянии. При оплате наличными – в момент возврата; при переводе – в течение 24 часов.</p>

<span class="sec">4. ОБЯЗАННОСТИ СТОРОН</span>
<p class="b">4.1. Обязанности Арендатора:</p>
<p>4.1.1. Арендатор обязуется использовать Автомобиль в рамках острова Пхукет. Выезд в провинции Пханг-Нга, Краби, парк Каосок – только с пакетом «Соседние провинции». Паромное сообщение на Самуи, Панган, Ко Ланта – только при страховке «Расширенная» или «Полное покрытие». Штраф за нарушение – 15 000 ฿.</p>
<p>4.1.2. Арендатор обязан соблюдать ПДД, несет ответственность за штрафы, расходы на эвакуатор и иные связанные расходы, а также обязан следить за техническим состоянием Автомобиля.</p>
<p>4.1.3. Автомобиль застрахован согласно выбранному тарифу. В случае поломки по вине Арендатора — компенсация всех расходов на ремонт/замену деталей, не покрытых страховкой.</p>
<p>4.1.4. При аварии — немедленно уведомить Арендодателя, вызвать аварийного комиссара. В течение 24 часов передать оригинал направления на ремонт от страховой компании. При отсутствии оригиналов — расходы несет Арендатор.</p>
<p>4.1.5. Если страховая не покрывает ущерб — Арендатор несет полную ответственность за любой ущерб, кражу или потерю Автомобиля.</p>
<p>4.1.6. При передаче авто третьим лицам — уведомить Арендодателя. Арендатор несет полную ответственность за ущерб, причиненный третьими лицами.</p>
<p>4.1.7. Вернуть Автомобиль в том же состоянии. Мойка: 600 ฿; сильные загрязнения: 1 500 ฿. Курение — штраф 4 000 ฿. Несогласованные модификации — 5 000 ฿. Отключение GPS-трекера — 10 000 ฿.</p>
<p>4.1.8. Вернуть с тем же уровнем топлива. Иначе: 750 ฿ (1 200 ฿ – Ranger) за первое деление; 350 ฿ за каждое последующее (MG – 250 ฿; Ranger – 800 ฿).</p>
<p>4.1.9. Замена или ремонт проколотых шин и камер — за счет Арендатора.</p>
<p>4.1.10. Возврат в указанное место и время. Доп. время 1–5 часов: 150 ฿/час; 5 и более часов: суточный тариф.</p>
<p>4.1.11. При ошибках на приборной панели — заглушить двигатель, уведомить Арендодателя. Игнорирование — полная ответственность.</p>
<p>4.1.12. Вождение в нетрезвом виде или под воздействием наркотиков — страховка недействительна, полная финансовая ответственность.</p>
<p class="b">4.2. Обязанности Арендодателя:</p>
<p>4.2.1. Предоставить Автомобиль в исправном состоянии.</p>
<p>4.2.2. Проводить плановое техническое обслуживание за свой счет.</p>

<span class="sec">5. ОТВЕТСТВЕННОСТЬ СТОРОН</span>
<p>5.1. В случае поломки по вине Арендатора — компенсация всех расходов по рыночной стоимости.</p>
<p>5.2. Арендодатель не несет ответственности за несчастные случаи, травмы или иной ущерб, причиненный Арендатору или третьим лицам.</p>

// ── GENERATE ─────────────────────────────────────────────────────────────
function genDoc(type){
  const html=docHTML();
  const num=D.num;
  if(type==="doc"){
    const full=`<!DOCTYPE html><html xmlns:o='urn:schemas-microsoft-com:office:office'
      xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
      <head><meta charset='utf-8'><title>Договор ${num}</title>
      <!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>90</w:Zoom>
      <w:DoNotOptimizeForBrowser/></w:WordDocument></xml><![endif]-->
      </head><body>${html.replace(/<!DOCTYPE[^>]*>/i,"").replace(/<html[^>]*>/i,"").replace(/<\/html>/i,"").replace(/<head>[\s\S]*?<\/head>/i,"")}</body></html>`;
    const blob=new Blob(['\ufeff',full],{type:"application/msword"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download=`Договор_${num}.doc`;a.click();
    toast("DOC скачивается…");
    DB.nextNum=Math.max(DB.nextNum,Number(num)+1);saveDB();
    if(String(D.num)===String(num)){D.num=DB.nextNum;}
  } else {
    if(typeof html2canvas==="undefined"||typeof window.jspdf==="undefined"){
      toast("PDF: нужен интернет. Используйте DOC","err");return;
    }
    toast("Готовлю PDF…");
    const h=document.createElement("div");
    h.style.cssText="position:fixed;left:-9999px;top:0;width:794px;background:#fff";
    h.innerHTML=html;document.body.appendChild(h);
    setTimeout(async()=>{
      try{
        const {jsPDF}=window.jspdf;
        const cv=await html2canvas(h,{scale:1.8,useCORS:true,backgroundColor:"#fff"});
        const img=cv.toDataURL("image/jpeg",.88);
        const pdf=new jsPDF("p","mm","a4");
        const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
        const ih=cv.height*pw/cv.width;
        let rem=ih,pos=0;
        pdf.addImage(img,"JPEG",0,pos,pw,ih);rem-=ph;
        while(rem>0){pos=rem-ih;pdf.addPage();pdf.addImage(img,"JPEG",0,pos,pw,ih);rem-=ph;}
        pdf.save(`Договор_${num}.pdf`);
        toast("PDF сохранён");
        DB.nextNum=Math.max(DB.nextNum,Number(num)+1);saveDB();
        if(String(D.num)===String(num)){D.num=DB.nextNum;}
      }catch(e){toast("Ошибка PDF — используйте DOC","err");}
      finally{document.body.removeChild(h);}
    },100);
  }
}

function togglePreview(){
  var html=docHTML();
  try{
    var blob=new Blob([html],{type:"text/html"});
    var url=URL.createObjectURL(blob);
    var win=window.open(url,"_blank");
    if(win){setTimeout(function(){URL.revokeObjectURL(url);},8000);return;}
  }catch(e){}
  var ex=document.getElementById("doc-overlay");
  if(ex){ex.remove();return;}
  var ov=document.createElement("div");
  ov.id="doc-overlay";
  var hd=document.createElement("div");
  hd.className="dov-head";
  var sp=document.createElement("span");
  sp.textContent="Предпросмотр договора";
  var cl=document.createElement("button");
  cl.textContent="✕ Закрыть";
  cl.onclick=function(){ov.remove();};
  hd.appendChild(sp);hd.appendChild(cl);
  var fr=document.createElement("iframe");
  fr.id="dov-frame";fr.srcdoc=html;
  ov.appendChild(hd);ov.appendChild(fr);
  document.body.appendChild(ov);
}
