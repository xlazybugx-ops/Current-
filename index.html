<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0D2233">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VEDRIVE">
<title>VEDRIVE — Договоры аренды</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════════════
   VEDRIVE v4 — Light & Clean Design System
   Palette: cloud white base, deep teal accent, warm sand neutrals
   ═══════════════════════════════════════════════════════════════════ */
:root {
  /* Brand */
  --navy:    #0D2233;
  --teal:    #1A6E7A;
  --teal-m:  #2590A0;
  --teal-l:  #D8EFF2;
  --amber:   #E8960A;
  --amber-l: #FEF3DC;
  --red:     #D04030;
  --green:   #2A8B56;
  --blue:    #3B73C8;

  /* Neutrals */
  --bg:      #F4F6F8;     /* page background — nearly white */
  --surface: #FFFFFF;     /* cards */
  --border:  #E2E8ED;
  --border-m:#C8D4DB;
  --text:    #0D2233;
  --sub:     #5A7080;
  --muted:   #8CA0AC;
  --sand:    #E8DCC8;     /* license plate bg */

  /* Spacing / Radius */
  --r:       14px;
  --r-sm:    10px;
  --r-xs:    7px;
  --gap:     12px;

  /* Shadows */
  --sh:      0 1px 6px rgba(13,34,51,.07), 0 3px 12px rgba(13,34,51,.05);
  --sh-lg:   0 4px 24px rgba(13,34,51,.12);

  /* Safe areas */
  --safe-t: env(safe-area-inset-top,    0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  padding-bottom: calc(68px + var(--safe-b));
}
input, select, button, textarea { font-family: inherit; font-size: 16px; }

/* ── Hero header ──────────────────────────────────────────────────── */
.hero {
  background: linear-gradient(145deg, var(--navy) 0%, var(--teal) 120%);
  color: #fff;
  padding: calc(var(--safe-t) + 22px) 20px 20px;
  border-radius: 0 0 22px 22px;
  box-shadow: 0 2px 16px rgba(13,34,51,.18);
  position: relative;
}
.hero.compact {
  padding: calc(var(--safe-t) + 14px) 20px 14px;
  display: flex; align-items: center; gap: 12px;
}
.hero.ok { background: linear-gradient(145deg, #0f5a35, var(--green)); }
.brand { font-size: 28px; font-weight: 800; letter-spacing: 2.5px; }
.brand.sm { font-size: 18px; letter-spacing: 1px; }
.hero-sub { opacity:.78; font-size:13.5px; margin-top:2px; }
.hero-sub.xs { font-size:11.5px; }
.hero-back {
  margin-left: auto;
  width: 34px; height: 34px; border-radius: 50%; border: none;
  background: rgba(255,255,255,.15); color:#fff; font-size:16px;
  display: grid; place-items: center; cursor: pointer; flex-shrink: 0;
}
.hero.ok .check {
  width:54px; height:54px; margin:0 auto 10px; border-radius:50%;
  background:rgba(255,255,255,.2); display:grid; place-items:center;
  font-size:28px; animation: pop .35s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes pop { from{transform:scale(.3);opacity:0} to{transform:scale(1);opacity:1} }

/* ── Layout ──────────────────────────────────────────────────────── */
.wrap { padding: 16px 16px 8px; max-width: 540px; margin: 0 auto; }
.wrap.wide { max-width: 720px; }

/* ── Cards ───────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border-radius: var(--r);
  padding: 16px;
  box-shadow: var(--sh);
  margin-bottom: 12px;
  border: 1px solid var(--border);
}
.card.tight { padding: 4px 14px; }
.card.flush { padding: 0; overflow: hidden; }

/* ── Typography ──────────────────────────────────────────────────── */
h2.step-h { font-size: 22px; margin: 8px 0 14px; font-weight: 700; }
h3.muted-h {
  font-size: 11px; text-transform: uppercase; letter-spacing: .9px;
  color: var(--muted); margin: 18px 4px 8px; font-weight: 600;
}
.muted { color: var(--muted); }
.sub   { color: var(--sub); }

/* ── Step indicator ──────────────────────────────────────────────── */
.stepline { display:flex; align-items:center; margin:4px 0 2px; }
.dot {
  width:28px; height:28px; flex:0 0 28px; border-radius:50%;
  display:grid; place-items:center; font-size:12px; font-weight:600;
  background: var(--surface); color:var(--muted);
  border:1.5px solid var(--border);
}
.dot.active {
  background:var(--amber); color:#fff; border-color:var(--amber);
  box-shadow:0 0 0 4px var(--amber-l);
}
.dot.done { background:var(--teal); color:#fff; border-color:var(--teal); }
.dot.done::after { content:"✓"; font-size:13px; }
.dot.done > * { display:none; }
.line { flex:1; height:2px; background:var(--border); margin:0 2px; }
.line.done { background:var(--teal); }

/* ── Form fields ─────────────────────────────────────────────────── */
.fld { display:block; margin-bottom:13px; }
.fld > span {
  display:block; font-size:12px; color:var(--sub);
  margin-bottom:5px; font-weight:600; letter-spacing:.2px;
}
.fld input, .fld select {
  width:100%; padding:13px 14px;
  border:1.5px solid var(--border);
  border-radius:var(--r-sm);
  background:var(--surface); color:var(--text); outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.fld input:focus, .fld select:focus {
  border-color:var(--teal-m);
  box-shadow:0 0 0 3px rgba(26,110,122,.1);
}
.fld.inline { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px; }
.fld.inline > span { margin-bottom:0; flex:1; font-size:13px; }
.moneyin { display:flex; align-items:center; gap:6px; }
.moneyin input { width:108px; text-align:right; padding:10px 12px; border:1.5px solid var(--border); border-radius:var(--r-sm); }
.moneyin span { color:var(--muted); font-size:14px; }

/* mileage hint */
.km-hint { font-size:11.5px; color:var(--amber); font-weight:600; margin:-4px 0 8px; }

/* deposit info row */
.deposit-info-row {
  display:flex; align-items:center; justify-content:space-between;
  background:var(--teal-l); border-radius:var(--r-xs); padding:9px 12px;
  margin-bottom:10px; border:1px solid #c0dfe4;
}
.di-label { font-size:13px; color:var(--teal); font-weight:500; }
.di-val { font-size:14px; font-weight:700; color:var(--teal); }

/* ── Buttons ─────────────────────────────────────────────────────── */
.btn {
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%; padding:13px 16px; border:none; border-radius:var(--r-sm);
  font-weight:700; font-size:15.5px; margin-bottom:9px; cursor:pointer;
  background:var(--surface); color:var(--text);
  border:1.5px solid var(--border);
  transition:transform .08s, opacity .15s;
}
.btn:active { transform:scale(.98); opacity:.88; }
.btn.primary { background:var(--amber); color:#fff; border-color:var(--amber); box-shadow:0 3px 12px rgba(232,150,10,.3); }
.btn.big { padding:15px; font-size:16.5px; }
.btn.ghost { background:transparent; border-color:var(--border); color:var(--teal); }
.btn.danger { background:transparent; border-color:#f0cbc5; color:var(--red); }
.btn.drive { background:var(--surface); border-color:#4285F4; color:#1a5cb8; }
.btn.drive span { font-size:17px; }
.link { background:none; border:none; color:var(--teal); font-weight:600; padding:4px 6px; cursor:pointer; font-size:14px; }
.link.danger { color:var(--red); }
.filelabel { display:flex; cursor:pointer; }

/* download buttons side-by-side */
.dlrow { display:flex; gap:9px; margin-bottom:2px; }
.dlrow .btn { margin-bottom:9px; font-size:14px; padding:12px; }
.btn.dl { background:var(--navy); color:#fff; border-color:var(--navy); }
.btn.dl span { font-size:17px; }
.btn.dl.pdf { background:var(--teal); border-color:var(--teal); }

/* ── License plate ───────────────────────────────────────────────── */
.plate {
  font-family:"SF Mono",ui-monospace,monospace; font-weight:700;
  background:var(--sand); color:var(--navy);
  padding:3px 9px; border-radius:6px; font-size:14px; letter-spacing:.4px;
  border:1px solid #d0bc98; white-space:nowrap;
}
.plate.sm { font-size:13px; padding:2px 7px; }
.plate.xs { font-size:11px; padding:1px 5px; }

/* class badges */
.cls { font-size:10px; text-transform:uppercase; letter-spacing:.4px; padding:3px 8px; border-radius:20px; font-weight:700; white-space:nowrap; }
.cls-sedan  { background:#d9eef2; color:#145a66; }
.cls-suv    { background:#ede3f6; color:#4b3f8c; }
.cls-pickup { background:#f6e4cf; color:#8a4f1a; }

/* ── Car cards (picker) ──────────────────────────────────────────── */
.period-chip {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--navy); color:#fff;
  padding:7px 14px; border-radius:20px; font-size:13px; margin-bottom:14px;
}

.grid { display:grid; grid-template-columns:1fr 1fr; gap:var(--gap); margin-bottom:8px; }
@media(min-width:480px){ .grid { grid-template-columns:repeat(3,1fr); } }

.carcard {
  text-align:left; background:var(--surface); border:1.5px solid var(--border);
  border-radius:var(--r); padding:0 0 12px; overflow:hidden; cursor:pointer;
  border-top:3px solid var(--teal);
  transition:transform .1s, box-shadow .15s; box-shadow:var(--sh);
  display:flex; flex-direction:column;
}
.carcard:active { transform:scale(.97); }
.carcard.busy { opacity:.5; border-top-color:var(--border); cursor:default; }

/* car photo */
.photo-hero { height:80px; background:#eee8de; overflow:hidden; }
.photo-hero img { width:100%; height:80px; object-fit:cover; display:block; }
.carcard.busy .photo-hero { filter:grayscale(1); }

.carcard-body { padding:10px 10px 0; flex:1; display:flex; flex-direction:column; }
.carcard-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.carname { font-weight:700; font-size:13.5px; margin-bottom:4px; line-height:1.2; }
.carcolor-tag { font-size:10px; color:var(--muted); font-weight:400; }
.carspecs { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:5px; }
.carspecs span { font-size:10.5px; background:var(--teal-l); color:var(--teal); padding:1px 6px; border-radius:5px; font-weight:600; }
.carmeta { font-size:11.5px; color:var(--sub); }
.carmeta span { display:block; }
.ins-badge { font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px; display:inline-block; margin-top:4px; }
.ins-standard { background:#e6f4e6; color:#1a7a2a; }
.ins-full { background:#fff3cd; color:#8a6200; }
.price-est { margin-top:6px; font-size:12.5px; font-weight:700; color:var(--teal); }
.busy-tag { margin-top:6px; font-size:11px; color:var(--red); font-weight:600; }
.last-km { font-size:10.5px; color:var(--muted); margin-top:3px; }
.carcard-top, .carcard-body > * { padding-left: 0; }

/* collapsed busy section */
.busy-details { margin-top:4px; }
.busy-details summary {
  cursor:pointer; font-size:12.5px; color:var(--sub); font-weight:600;
  padding:8px 4px; list-style:none; display:flex; align-items:center; gap:6px;
}
.busy-details summary::before { content:"▸"; font-size:11px; transition:transform .2s; }
.busy-details[open] summary::before { transform:rotate(90deg); }

.empty { text-align:center; color:var(--muted); padding:30px 12px; font-size:14px; }
.carline { font-weight:600; margin-bottom:10px; display:flex; align-items:center; gap:8px; font-size:14px; }

/* pricing photo hero */
.photo-hero.big { height:110px; border-radius:var(--r-sm); overflow:hidden; margin-bottom:12px; }
.photo-hero.big img { height:110px; }

/* specs row */
.car-specs-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.spec-pill { font-size:12px; padding:4px 10px; border-radius:14px; background:var(--teal-l); color:var(--teal); font-weight:600; }
.spec-pill.ins-full { background:#fff3cd; color:#8a6200; }
.spec-pill.ins-standard { background:#e6f4e6; color:#1a7a2a; }

/* ── Option rows ─────────────────────────────────────────────────── */
.optrow { display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:1px solid var(--border); }
.optrow:last-child { border-bottom:none; }
.optcheck { display:flex; align-items:flex-start; gap:11px; flex:1; cursor:pointer; }
.optcheck input[type=checkbox] { width:20px; height:20px; accent-color:var(--teal); flex:0 0 20px; margin-top:1px; }
.optlabel { font-size:13.5px; line-height:1.3; }
.optlabel small { display:block; color:var(--muted); font-size:11px; margin-top:1px; }
.optrow.on .optlabel { font-weight:600; color:var(--text); }
.optprice { display:flex; align-items:center; gap:4px; }
.optprice input { width:78px; text-align:right; padding:8px 9px; border:1.5px solid var(--border); border-radius:8px; font-size:14px; }
.optprice span { color:var(--muted); font-size:13px; }

/* total bar */
.total-bar { background:var(--navy); color:#fff; border-radius:var(--r); padding:14px 16px; margin:12px 0; }
.total-bar > div { display:flex; justify-content:space-between; align-items:baseline; }
.total-bar b { font-size:22px; }
.total-bar .dep { margin-top:7px; padding-top:7px; border-top:1px solid rgba(255,255,255,.15); opacity:.8; }
.total-bar .dep b { font-size:15px; }

/* home recent */
.home-recent { background:var(--surface); border-radius:var(--r); border:1px solid var(--border); box-shadow:var(--sh); overflow:hidden; margin-top:8px; }
.hr-label { font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); padding:10px 14px 6px; font-weight:600; }
.hr-item { display:flex; align-items:center; gap:10px; padding:10px 14px; border-top:1px solid var(--border); cursor:pointer; transition:background .1s; }
.hr-item:active { background:var(--bg); }
.hr-num { font-size:13px; font-weight:700; color:var(--teal); min-width:50px; }
.hr-name { font-size:13px; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.hr-sum { font-size:13px; font-weight:700; color:var(--sub); white-space:nowrap; }

/* ── Review ──────────────────────────────────────────────────────── */
.review { margin-bottom:12px; }
.rev-sec { background:var(--surface); border-radius:var(--r); padding:14px 16px; box-shadow:var(--sh); margin-bottom:10px; border:1px solid var(--border); }
.rev-sec h4 { margin:0 0 10px; font-size:12.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--teal); display:flex; align-items:center; gap:6px; }
.rh-ic { font-size:14px; }
.rev-grid { display:grid; grid-template-columns:auto 1fr; gap:6px 14px; font-size:13.5px; }
.rev-grid span { color:var(--sub); }
.rev-grid b { font-weight:600; word-break:break-word; }
.rev-table { width:100%; border-collapse:collapse; font-size:13.5px; }
.rev-table td { padding:7px 0; border-bottom:1px solid var(--border); }
.rev-table td.r { text-align:right; white-space:nowrap; font-variant-numeric:tabular-nums; }
.rev-table .grand td { border-top:2px solid var(--navy); border-bottom:none; font-weight:800; font-size:16px; padding-top:9px; }
.rev-table .dep td { color:var(--muted); border:none; font-size:12.5px; }

/* ── Result screen ───────────────────────────────────────────────── */
.result-card { text-align:center; border:none; box-shadow:var(--sh-lg); }
.rc-line { font-size:17px; font-weight:600; }
.rc-line.muted { font-size:13px; color:var(--sub); margin:4px 0 10px; }
.rc-total { font-size:32px; font-weight:800; color:var(--teal); margin:4px 0 4px; }

/* ── Registry ────────────────────────────────────────────────────── */
.searchbar { margin-bottom:12px; position:relative; }
.searchbar input {
  width:100%; padding:11px 16px 11px 40px;
  border:1.5px solid var(--border); border-radius:22px;
  background:var(--surface); outline:none; font-size:15px; color:var(--text);
}
.searchbar::before { content:"🔍"; position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:14px; }
.searchbar input:focus { border-color:var(--teal-m); }

.reg-card {
  background:var(--surface); border-radius:var(--r);
  padding:13px 15px; box-shadow:var(--sh); margin-bottom:8px;
  cursor:pointer; border:1px solid var(--border);
  border-left:3px solid var(--teal);
  transition:transform .08s;
}
.reg-card:active { transform:scale(.99); }
.reg-card.cancelled { opacity:.45; border-left-color:var(--red); }
.reg-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:3px; }
.reg-num { font-weight:800; color:var(--navy); font-size:14px; }
.reg-total { font-weight:800; color:var(--teal); font-size:14px; }
.reg-name { font-size:15px; font-weight:600; margin:2px 0; }
.reg-meta { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--sub); flex-wrap:wrap; }
.reg-dates { margin-left:auto; white-space:nowrap; }

/* ── Gantt / schedule ────────────────────────────────────────────── */
.gantt-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
.gantt {
  background:var(--surface); border-radius:var(--r); padding:12px 8px 8px;
  box-shadow:var(--sh); border:1px solid var(--border);
  min-width:500px;
}
.gmonths { position:relative; height:18px; margin-left:90px; border-bottom:1px solid var(--border); margin-bottom:4px; }
.gmonths span { position:absolute; font-size:11px; color:var(--muted); text-transform:capitalize; }
.gtoday { position:absolute; top:0; bottom:-1000px; width:2px; background:var(--amber); z-index:3; opacity:.8; }
.grow { display:flex; align-items:center; height:32px; }
.glabel { width:86px; flex:0 0 86px; display:flex; flex-direction:column; gap:1px; padding-right:6px; }
.glabel .plate.xs { max-width:78px; }
.glabel small { font-size:9.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.gtrack { position:relative; flex:1; height:22px; border-radius:5px; background:repeating-linear-gradient(90deg,var(--border) 0 1px,transparent 1px 100%); }
.gbar { position:absolute; top:2px; height:18px; border-radius:5px; display:flex; align-items:center; justify-content:center; cursor:pointer; min-width:16px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.15); }
.gbar span { font-size:9.5px; font-weight:700; color:#fff; padding:0 3px; white-space:nowrap; }
.gbar.cls-sedan  { background:var(--teal); }
.gbar.cls-suv    { background:#5b4b9e; }
.gbar.cls-pickup { background:#c47a20; }
.gfree { font-size:10px; color:#b0bec5; padding-left:4px; }
.legend { display:flex; gap:12px; flex-wrap:wrap; margin:10px 2px; font-size:12px; }
.lg { display:flex; align-items:center; gap:5px; color:var(--sub); }
.lg::before { content:""; width:12px; height:12px; border-radius:3px; }
.lg.cls-sedan::before  { background:var(--teal); }
.lg.cls-suv::before    { background:#5b4b9e; }
.lg.cls-pickup::before { background:#c47a20; }
.lg.today::before { background:var(--amber); width:3px; height:14px; border-radius:1px; }

/* ── Stats ───────────────────────────────────────────────────────── */
.kpis { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
.kpi { background:var(--surface); border-radius:var(--r-sm); padding:12px 10px; text-align:center; box-shadow:var(--sh); border:1px solid var(--border); }
.kpi-v { font-size:18px; font-weight:800; color:var(--navy); line-height:1.1; }
.kpi-l { font-size:10px; color:var(--muted); margin-top:2px; }
.kpi.wide { grid-column:span 2; }

.statrow { padding:9px 0; border-bottom:1px solid var(--border); cursor:pointer; }
.statrow:last-child { border-bottom:none; }
.statrow-h { display:flex; align-items:center; gap:7px; font-size:13px; margin-bottom:5px; }
.statrow-h small { color:var(--sub); flex:1; }
.statrow-h b { color:var(--teal); white-space:nowrap; }
.statbar { height:6px; background:var(--border); border-radius:4px; overflow:hidden; }
.statfill { height:100%; background:linear-gradient(90deg,var(--teal),var(--teal-m)); border-radius:4px; }
.statsub { font-size:11px; color:var(--muted); margin-top:2px; }

.mini-table { width:100%; border-collapse:collapse; font-size:13px; }
.mini-table th { text-align:left; color:var(--muted); font-size:11px; text-transform:uppercase; padding:7px 4px; border-bottom:1.5px solid var(--border); }
.mini-table td { padding:8px 4px; border-bottom:1px solid var(--border); }
.mini-table .r { text-align:right; }
.mini-table .c { text-align:center; }

// ============================================================================
// VEDRIVE — Storage layer
// Local-first database on localStorage. Optional cloud sync via Google Apps
// Script Web App (set the URL in Settings).
// ============================================================================

const DB = (() => {
  const KEY = "vedrive_db_v1";
  const SYNC_KEY = "vedrive_sync_url";

  let state = null;
  let _mem = null;
  let _syncUrlMem = "";

  function _fresh() {
    return {
    lastMileageForPlate,
      fleet: structuredClone(SEED.fleet),
      options: structuredClone(SEED.options),
      contracts: structuredClone(SEED.contracts),
      nextNum: SEED.nextNum,
      company: structuredClone(SEED.company),
      damages: structuredClone(SEED.damages),
      insurance: structuredClone(SEED.insurance),
      updatedAt: new Date().toISOString(),
    };
  }

  function load() {
    try {
      if (_mem) { state = _mem; }
      else { state = _fresh(); save(); }
    } catch (e) {
      console.error("DB load failed, resetting", e);
      state = _fresh(); save();
    }
    // Backfill any new seed cars/options that don't exist yet (non-destructive)
    if (!state.options) state.options = structuredClone(SEED.options);
    if (!state.company) state.company = structuredClone(SEED.company);
    if (!state.damages) state.damages = structuredClone(SEED.damages);
    if (!state.insurance) state.insurance = structuredClone(SEED.insurance);
    return state;
  }

  function save() {
    state.updatedAt = new Date().toISOString();
    _mem = state;
  }

  function get() { return state || load(); }

  // ── Contracts ─────────────────────────────────────────────────────────────
  function addContract(c) {
    c.num = String(state.nextNum);
    state.nextNum += 1;
    state.contracts.push(c);
    save();
    return c;
  }

  function updateContract(num, patch) {
    const i = state.contracts.findIndex(c => c.num === num);
    if (i >= 0) { state.contracts[i] = { ...state.contracts[i], ...patch }; save(); }
  }

  function deleteContract(num) {
    state.contracts = state.contracts.filter(c => c.num !== num);
    save();
  }

  // ── Fleet ─────────────────────────────────────────────────────────────────
  function addCar(car) {
    car.id = car.id || ("car-" + Math.random().toString(36).slice(2, 8));
    state.fleet.push(car);
    save();
    return car;
  }
  function updateCar(id, patch) {
    const i = state.fleet.findIndex(c => c.id === id);
    if (i >= 0) { state.fleet[i] = { ...state.fleet[i], ...patch }; save(); }
  }
  function deleteCar(id) {
    state.fleet = state.fleet.filter(c => c.id !== id);
    save();
  }
  // Returns the mileage recorded in the most recent contract for this plate
  function lastMileageForPlate(plate) {
    const relevant = state.contracts
      .filter(c => c.plate === plate && c.status !== "cancelled" && c.mileageOut != null)
      .sort((a, b) => new Date(b.start) - new Date(a.start));
    return relevant.length ? relevant[0].mileageOut : null;
  }

  function carByPlate(plate) {
    return state.fleet.find(c => c.plate === plate);
  }

  // ── Availability ──────────────────────────────────────────────────────────
  // Returns cars with no overlapping active contract in [start, end].
  function availableCars(startISO, endISO, ignoreNum = null) {
    const s = new Date(startISO).getTime();
    const e = new Date(endISO).getTime();
    return state.fleet.filter(car => {
      const conflict = state.contracts.some(c => {
        if (c.num === ignoreNum) return false;
        if (c.status === "cancelled") return false;
        if (c.plate !== car.plate) return false;
        const cs = new Date(c.start).getTime();
        const ce = new Date(c.end).getTime();
        return s < ce && e > cs; // overlap
      });
      return !conflict;
    });
  }

  function carBookings(plate) {
    return state.contracts
      .filter(c => c.plate === plate && c.status !== "cancelled")
      .sort((a, b) => new Date(a.start) - new Date(b.start));
  }

  // ── Export / Import ───────────────────────────────────────────────────────
  function exportJSON() {
    return JSON.stringify(state, null, 2);
  }
  function importJSON(text) {
    const data = JSON.parse(text);
    if (!data.fleet || !data.contracts) throw new Error("Файл не похож на базу VEDRIVE");
    state = data;
    save();
  }
  function reset() {
    state = _fresh();
    save();
  }

  // ── Cloud sync (Google Apps Script Web App) ──────────────────────────────
  function getSyncUrl() { return _syncUrlMem || ""; }
  function setSyncUrl(url) { _syncUrlMem = url.trim(); }

  async function pushCloud() {
    const url = getSyncUrl();
    if (!url) throw new Error("Не задан адрес синхронизации");
    const res = await fetch(url, {
      method: "POST",
      body: JSON.stringify({ action: "save", payload: state }),
      headers: { "Content-Type": "text/plain;charset=utf-8" },
    });
    if (!res.ok) throw new Error("Сервер вернул " + res.status);
    return await res.text();
  }

  // ── Сохранить договор (DOC) в Google Drive ─────────────────────────────
  async function saveDriveDoc(contract, htmlContent) {
    const url = getSyncUrl();
    if (!url) throw new Error("Не задан URL Google Apps Script");
    const filename = `Договор_${contract.num}.doc`;
    const res = await fetch(url, {
      method: "POST",
      body: JSON.stringify({ action: "saveDoc", filename, html: htmlContent }),
      headers: { "Content-Type": "text/plain;charset=utf-8" },
    });
    if (!res.ok) throw new Error("Сервер вернул " + res.status);
    const data = await res.json();
    if (!data.ok) throw new Error("Drive отклонил файл");
    return data; // { ok, id, url }
  }

  // ── Сохранить PDF (base64) в Google Drive ─────────────────────────────
  async function saveDrivePdf(contract, base64data) {
    const url = getSyncUrl();
    if (!url) throw new Error("Не задан URL Google Apps Script");
    const filename = `Договор_${contract.num}.pdf`;
    const res = await fetch(url, {
      method: "POST",
      body: JSON.stringify({ action: "savePdf", filename, base64: base64data }),
      headers: { "Content-Type": "text/plain;charset=utf-8" },
    });
    if (!res.ok) throw new Error("Сервер вернул " + res.status);
    const data = await res.json();
    if (!data.ok) throw new Error("Drive отклонил файл");
    return data;
  }

  async function pullCloud() {
    const url = getSyncUrl();
    if (!url) throw new Error("Не задан адрес синхронизации");
    const res = await fetch(url + "?action=load");
    if (!res.ok) throw new Error("Сервер вернул " + res.status);
    const data = await res.json();
    if (data && data.fleet && data.contracts) {
      state = data;
      save();
      return true;
    }
    throw new Error("Облако пустое или повреждено");
  }

  return {
    lastMileageForPlate,
    load, save, get,
    addContract, updateContract, deleteContract,
    addCar, updateCar, deleteCar, carByPlate,
    availableCars, carBookings,
    exportJSON, importJSON, reset,
    getSyncUrl, setSyncUrl, pushCloud, pullCloud, saveDriveDoc, saveDrivePdf,
  };
})();

    return Number(n).toLocaleString("ru-RU");
  }

    if (!iso) return "____";
    const d = new Date(iso);
    const p = (x) => String(x).padStart(2, "0");
    return `${p(d.getDate())}.${p(d.getMonth() + 1)}.${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }
  function fmtDate(iso) {
    if (!iso) return "____";
    const d = new Date(iso);
    const p = (x) => String(x).padStart(2, "0");
    return `${p(d.getDate())}.${p(d.getMonth() + 1)}.${d.getFullYear()}`;
  }

    const db = DB.get();

      </table>

      <h2>6. SIGNATURES</h2>
      <table class="sign">
        <tr><td><b>Lessor:</b> ${co.name}</td><td><b>Representative:</b> ___________________</td></tr>
        <tr><td><b>Lessee:</b> <span class="v">${c.lessee || "____"}</span></td><td><b>Signature:</b> ___________________</td></tr>
        <tr><td><b>Place:</b> ${co.place}</td><td><b>Date:</b> <span class="v">${fmtDate(c.signed)}</span></td></tr>
      </table>
      <div class="foot">${co.name}, ${co.address} · ${co.phone}</div>
    `;
    return html;
  }

  // ── Export to .doc (Word reads HTML wrapped as a Word document) ───────────
  function downloadDOC(c) {
    const body = contractHTML(c);
    const full = `<!DOCTYPE html><html xmlns:o='urn:schemas-microsoft-com:office:office'
      xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
      <head><meta charset="utf-8"><title>Договор ${c.num}</title>
      <!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View>
      <w:Zoom>100</w:Zoom><w:DoNotOptimizeForBrowser/></w:WordDocument></xml><![endif]-->
      </head><body>${body}</body></html>`;
    const blob = new Blob(['\ufeff', full], { type: "application/msword" });
    triggerDownload(blob, `Договор_${c.num}.doc`);
  }

  // ── Export to PDF via jsPDF + html2canvas (offline, on-device) ────────────
  async function downloadPDF(c) {
    const holder = document.createElement("div");
    holder.style.cssText = "position:fixed;left:-9999px;top:0;width:794px;background:#fff;padding:24px;";
    holder.innerHTML = contractHTML(c, { forPrint: true });
    document.body.appendChild(holder);

    try {
      const { jsPDF } = window.jspdf;
      const canvas = await html2canvas(holder, { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
      const img = canvas.toDataURL("image/jpeg", 0.92);
      const pdf = new jsPDF("p", "mm", "a4");
      const pw = pdf.internal.pageSize.getWidth();
      const ph = pdf.internal.pageSize.getHeight();
      const iw = pw;
      const ih = canvas.height * iw / canvas.width;
      let left = ih;
      let pos = 0;
      pdf.addImage(img, "JPEG", 0, pos, iw, ih);
      left -= ph;
      while (left > 0) {
        pos = left - ih;
        pdf.addPage();
        pdf.addImage(img, "JPEG", 0, pos, iw, ih);
        left -= ph;
      }
      pdf.save(`Договор_${c.num}.pdf`);
    } finally {
      document.body.removeChild(holder);
    }
  }

  function previewHTML(c) { return contractHTML(c); }

  function triggerDownload(blob, name) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  // ── Build the full Word-compatible HTML string (for Drive upload) ───────
  function buildDOCHtml(c) {
    const body = contractHTML(c);
    return `<!DOCTYPE html><html xmlns:o='urn:schemas-microsoft-com:office:office'
      xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
      <head><meta charset="utf-8"><title>Договор ${c.num}</title>
      <!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View>
      <w:Zoom>100</w:Zoom><w:DoNotOptimizeForBrowser/></w:WordDocument></xml><![endif]-->
      </head><body>${body}</body></html>`;
  }

  // ── Generate PDF as base64 string (for Drive upload) ─────────────────────
  async function generatePDFBase64(c) {
    if (typeof html2canvas === 'undefined' || typeof window.jspdf === 'undefined') return null;
    const holder = document.createElement("div");
    holder.style.cssText = "position:fixed;left:-9999px;top:0;width:794px;background:#fff;padding:24px;";
    holder.innerHTML = contractHTML(c, { forPrint: true });
    document.body.appendChild(holder);
    try {
      const { jsPDF } = window.jspdf;
      const canvas = await html2canvas(holder, { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
      const imgData = canvas.toDataURL("image/jpeg", 0.92);
      const pdf = new jsPDF("p", "mm", "a4");
      const pw = pdf.internal.pageSize.getWidth();
      const ph = pdf.internal.pageSize.getHeight();
      const iw = pw;
      const ih = canvas.height * iw / canvas.width;
      let left = ih, pos = 0;
      pdf.addImage(imgData, "JPEG", 0, pos, iw, ih);
      left -= ph;
      while (left > 0) { pos = left - ih; pdf.addPage(); pdf.addImage(imgData, "JPEG", 0, pos, iw, ih); left -= ph; }
      // Return base64 string
      return pdf.output("datauristring").split(",")[1];
    } finally {
      document.body.removeChild(holder);
    }
  }

  // ── Download a pre-generated base64 PDF ──────────────────────────────────
  function downloadBase64PDF(base64, filename) {
    const bytes = atob(base64);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    const blob = new Blob([arr], { type: "application/pdf" });
    triggerDownload(blob, filename);
  }

  return { downloadDOC, downloadPDF, previewHTML, fmtDate, fmtDateTime, money, buildDOCHtml, generatePDFBase64, downloadBase64PDF };
})();

    if (!iso) return "—";
    const d = new Date(iso); const p = x => String(x).padStart(2, "0");
    return `${p(d.getDate())}.${p(d.getMonth() + 1)}.${d.getFullYear()}`;
  }
  function fmtDT(iso) {
    if (!iso) return "—";
    const d = new Date(iso); const p = x => String(x).padStart(2, "0");
    return `${p(d.getDate())}.${p(d.getMonth() + 1)} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }
  function daysBetween(a, b) {
    const ms = new Date(b) - new Date(a);
    return Math.max(1, Math.round(ms / 86400000));
  }

    const t = el(`<div class="toast ${kind}">${esc(msg)}</div>`);

  function createContract() {
    const d = draft;
    const car = DB.carByPlate(d.plate);
    const contract = {
      num: null,
      signed: new Date().toISOString().slice(0, 10),
      lessee: d.lessee, passport: d.passport, idl: d.idl, phone: d.phone, hotel: d.hotel,
      plate: d.plate, make: d.make,
      start: d.start, end: d.end, days: d.days,
      rent: Number(d.rent) || 0,
      deposit: Number(d.deposit) || (car ? car.depositTHB : 5000),
      prepay: Number(d.prepay) || 0,
      opts: { ...d.opts },
      total: calcTotal(),
      mileageOut: d.mileageOut || null,
      status: "active",
      createdAt: new Date().toISOString(),
    };
    const saved = DB.addContract(contract);
    draft = null;
    toast(`Договор № ${saved.num} создан`);
    syncIfEnabled();
    showResult(saved.num);
  }

  async function dlDoc(num) {
    const c = DB.get().contracts.find(x => x.num === num);
    // 1. Local download
    try { DOC.downloadDOC(c); toast("DOC скачивается…"); } catch(e) { toast("Ошибка загрузки DOC", "err"); }
    // 2. Save to Google Drive (if sync URL configured)
    if (DB.getSyncUrl()) {
      try {
        const htmlContent = DOC.buildDOCHtml(c);
        const result = await DB.saveDriveDoc(c, htmlContent);
        toast("✓ DOC сохранён в Google Drive");
      } catch(e) { toast("Drive: " + e.message, "err"); }
    }
  }
  async function dlPdf(num) {
    const c = DB.get().contracts.find(x => x.num === num);
    if (typeof html2canvas === 'undefined' || typeof window.jspdf === 'undefined') {
      toast("PDF: нужен интернет для библиотеки. Попробуйте DOC или предпросмотр → Поделиться → Сохранить PDF", "err");
      return;
    }
    toast("Готовлю PDF…");
    try {
      // Generate PDF blob + save locally
      const base64 = await DOC.generatePDFBase64(c);
      if (base64) {
        // Local download
        DOC.downloadBase64PDF(base64, `Договор_${c.num}.pdf`);
        toast("PDF скачивается…");
        // Save to Drive
        if (DB.getSyncUrl()) {
          try {
            await DB.saveDrivePdf(c, base64);
            toast("✓ PDF сохранён в Google Drive");
          } catch(e) { toast("Drive PDF: " + e.message, "err"); }
        }
      } else {
        await DOC.downloadPDF(c); toast("PDF сохранён");
      }
    } catch (e) { console.error(e); toast("Ошибка PDF — используйте DOC или предпросмотр", "err"); }
  }

  // ════════════════════════════════════════════════════════════════════════
  // SCHEDULE (rental timeline per car)
  // ════════════════════════════════════════════════════════════════════════
  function viewSchedule() {
    const db = DB.get();
    const active = db.contracts.filter(c => c.status !== "cancelled");
    if (!active.length) return pageHeader("График аренды","") + `<div class="wrap"><div class="empty">Нет активных договоров</div></div>`;

    const minD = new Date(Math.min(...active.map(c => +new Date(c.start))));
    const maxD = new Date(Math.max(...active.map(c => +new Date(c.end))));
    minD.setHours(0,0,0,0); maxD.setHours(0,0,0,0);
    const span = Math.max(1, daysBetween(minD, maxD) + 1);
    const DAY_PX = 32;

    const days = [];
    for (let i = 0; i < span; i++) {
      const d = new Date(minD); d.setDate(d.getDate() + i);
      days.push({
        d, num: d.getDate(),
        dow: d.toLocaleDateString("ru-RU",{weekday:"short"}).replace(".",""),
        isToday: fmtDate(d) === fmtDate(new Date()),
        isWeekend: d.getDay()===0||d.getDay()===6
      });
    }

    const monthCols = [];
    let curMo = null;
    days.forEach(h => {
      const mo = h.d.toLocaleDateString("ru-RU",{month:"short"});
      if (!curMo || curMo.label !== mo) { curMo={label:mo,count:1}; monthCols.push(curMo); }
      else curMo.count++;
    });

    const rows = db.fleet.map(car => {
      const books = db.contracts.filter(c => c.plate===car.plate && c.status!=="cancelled");
      const cells = days.map((h,i) => {
        const t = h.d.getTime();
        const book = books.find(b => {
          const bs=new Date(b.start); bs.setHours(0,0,0,0);
          const be=new Date(b.end);   be.setHours(0,0,0,0);
          return t>=bs.getTime() && t<be.getTime();
        });
        if (!book) return `<td class="gcell${h.isToday?" gct":""}${h.isWeekend?" gcw":""}"></td>`;
        const bs0=new Date(book.start); bs0.setHours(0,0,0,0);
        const be0=new Date(book.end);   be0.setHours(0,0,0,0);
        const isFirst = t===bs0.getTime();
        const nx=new Date(h.d); nx.setDate(nx.getDate()+1);
        const isLast = nx>=be0;
        const cls = `gcell gcb cls-${car.cls}${isFirst?" gcbf":""}${isLast?" gcbl":""}${h.isToday?" gct":""}`;
        return `<td class="${cls}" onclick="App.showBookingPopup('${book.num}')">${isFirst?`<span class="gcb-lbl">${esc(book.num)}</span>`:""}</td>`;
      }).join("");
      const nm = car.make.length>10?car.make.slice(0,9)+"…":car.make;
      return `<tr><td class="glabel-td"><div class="plate xs">${esc(car.plate||"—")}</div><div class="glbl-mk">${esc(nm)}</div></td>${cells}</tr>`;
    }).join("");

    const dayHead = days.map(h =>
      `<th class="gdth${h.isToday?" gdth-t":""}${h.isWeekend?" gdth-w":""}">
        <span class="gdth-n">${h.num}</span><span class="gdth-d">${h.dow}</span>
      </th>`).join("");

    const moHead = monthCols.map(m =>
      `<th class="gmth" colspan="${m.count}">${m.label}</th>`).join("");

    return `
      ${pageHeader("График аренды", `${fmtDate(minD)} – ${fmtDate(maxD)} · ${span} дн.`)}
      <div id="booking-popup" class="bpop hidden" onclick="if(event.target===this)this.classList.add('hidden')"></div>
      <div class="sched-outer">
        <div class="sched-scroll">
          <table class="gtable" style="--dpx:${DAY_PX}px">
            <thead>
              <tr><th class="gcorner" rowspan="2"></th>${moHead}</tr>
              <tr>${dayHead}</tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div class="legend" style="padding:8px 14px 4px">
          <span class="lg cls-sedan">седан</span>
          <span class="lg cls-suv">SUV</span>
          <span class="lg cls-pickup">пикап</span>
          <span class="lg today">сегодня</span>
        </div>
      </div>`;
  }

  // ════════════════════════════════════════════════════════════════════════
  // STATS / REPORT
  // ════════════════════════════════════════════════════════════════════════
  function viewStats() {
    const db = DB.get();
    const active = db.contracts.filter(c => c.status !== "cancelled");
    const totalRev = active.reduce((s, c) => s + (c.total || 0), 0);
    const avg = active.length ? Math.round(totalRev / active.length) : 0;
    const totals = active.map(c => c.total);
    const maxC = totals.length ? Math.max(...totals) : 0;
    const minC = totals.length ? Math.min(...totals) : 0;
    const avgDays = active.length ? (active.reduce((s, c) => s + (c.days || 0), 0) / active.length).toFixed(1) : 0;

    // Revenue by car
    const byCar = {};
    active.forEach(c => {
      const k = c.plate || "—";
      byCar[k] = byCar[k] || { plate: k, make: c.make, count: 0, rev: 0 };
      byCar[k].count++; byCar[k].rev += c.total || 0;
    });
    const carRows = Object.values(byCar).sort((a, b) => b.rev - a.rev);
    const maxCarRev = Math.max(1, ...carRows.map(c => c.rev));

    // Revenue by make
    const byMake = {};
    active.forEach(c => {
      const k = (c.make || "—").replace(/\s+/g, " ");
      byMake[k] = byMake[k] || { make: k, count: 0, rev: 0 };
      byMake[k].count++; byMake[k].rev += c.total || 0;
    });
    const makeRows = Object.values(byMake).sort((a, b) => b.rev - a.rev);

    const kpi = (label, val, wide=false) => `<div class="kpi ${wide?"wide":""}"><div class="kpi-v">${val}</div><div class="kpi-l">${label}</div></div>`;

    const bar = (c) => `
      <div class="statrow" onclick="App.go('schedule')">
        <div class="statrow-h"><span class="plate xs">${esc(c.plate)}</span> <small>${esc(c.make)}</small><b>${money(c.rev)} ฿</b></div>
        <div class="statbar"><div class="statfill" style="width:${(c.rev / maxCarRev) * 100}%"></div></div>
        <div class="statsub">${c.count} дог.</div>
      </div>`;

    return `
      ${pageHeader("Отчёт и статистика", `${active.length} активных`)}
      <div class="wrap">
        <div class="kpis">
          ${kpi("Договоров", active.length)}
          ${kpi("Авто", db.fleet.length)}
          ${kpi("Доход, ฿", money(totalRev))}
          ${kpi("Средний чек, ฿", money(avg))}
          ${kpi("Макс. чек, ฿", money(maxC))}
          ${kpi("Мин. чек, ฿", money(minC))}
          ${kpi("Ср. срок, дн.", avgDays, true)}
        </div>

        <h3 class="muted-h">Доход по авто</h3>
        <div class="card tight">${carRows.map(bar).join("")}</div>

        <h3 class="muted-h">Доход по моделям</h3>
        <div class="card tight">
          <table class="mini-table">
            <tr><th>Модель</th><th>Дог.</th><th>Доход, ฿</th><th>Доля</th></tr>
            ${makeRows.map(m => `<tr><td>${esc(m.make)}</td><td class="c">${m.count}</td><td class="r">${money(m.rev)}</td><td class="r">${totalRev ? ((m.rev / totalRev) * 100).toFixed(0) : 0}%</td></tr>`).join("")}
            <tr class="grand"><td>Итого</td><td class="c">${active.length}</td><td class="r">${money(totalRev)}</td><td class="r">100%</td></tr>
          </table>
        </div>

        <button class="btn ghost" onclick="App.exportCSV()">Выгрузить реестр в CSV</button>
      </div>`;
  }

  function exportScheduleCSV() {
    const db = DB.get();
    if (!db.contracts.length){toast("Нет данных","err");return;}
    const head = ["Гос. номер","Марка","Дата","Статус","№ договора","Арендатор"];
    const rows = [];
    const dates = db.contracts.flatMap(c=>[new Date(c.start),new Date(c.end)]);
    const minD = new Date(Math.min(...dates)); minD.setHours(0,0,0,0);
    const maxD = new Date(Math.max(...dates)); maxD.setHours(0,0,0,0);
    for(let d=new Date(minD); d<=maxD; d.setDate(d.getDate()+1)){
      const ds = fmtDate(new Date(d));
      db.fleet.forEach(car=>{
        const book = db.contracts.find(c=>c.plate===car.plate&&c.status!=="cancelled"&&new Date(c.start)<=d&&new Date(c.end)>d);
        rows.push([car.plate,car.make,ds,book?"занят":"свободен",book?book.num:"",book?book.lessee:""].map(v=>`"${v||""}"`).join(","));
      });
    }
    const csv="\ufeff"+[head.join(","),...rows].join("\r\n");
    const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
    a.download="vedrive_schedule.csv"; a.click(); toast("График выгружен");
  }

  function exportStatsCSV() {
    const db = DB.get();
    const active = db.contracts.filter(c=>c.status!=="cancelled");
    const byCar = {};
    active.forEach(c=>{
      const k=c.plate||"—";
      if(!byCar[k]) byCar[k]={plate:k,make:c.make,count:0,rev:0,days:0};
      byCar[k].count++; byCar[k].rev+=c.total||0; byCar[k].days+=c.days||0;
    });
    const head = ["Гос. номер","Марка","Договоров","Дней","Доход ฿"];
    const rows = Object.values(byCar).sort((a,b)=>b.rev-a.rev).map(r=>[r.plate,r.make,r.count,r.days,r.rev].map(v=>`"${v}"`).join(","));
    const tv=active.reduce((s,c)=>s+(c.total||0),0);
    rows.push(['"ИТОГО"','""',`"${active.length}"`,`"${active.reduce((s,c)=>s+(c.days||0),0)}"`,`"${tv}"`].join(","));
    const csv="\ufeff"+[head.join(","),...rows].join("\r\n");
    const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8"}));
    a.download="vedrive_stats.csv"; a.click(); toast("Отчёт выгружен");
  }

  function exportCSV() {
    const db = DB.get();
    const head = ["Номер","Подписан","ФИО","Паспорт","МВУ","Телефон","Отель","Авто","ГосНомер","Начало","Окончание","Дней","Аренда","Предоплата","Залог","Итого","Статус"];
    const rows = db.contracts.map(c => [
      c.num, c.signed, c.lessee, c.passport, c.idl, c.phone, c.hotel, c.make, c.plate,
      c.start, c.end, c.days, c.rent, c.prepay, c.deposit, c.total, c.status || "active"
    ].map(v => `"${String(v ?? "").replace(/"/g, '""')}"`).join(","));
    const csv = "\ufeff" + [head.join(","), ...rows].join("\r\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = "vedrive_registry.csv"; a.click();
    toast("CSV сохранён");
  }

          <div class="tech-row" onclick="App.exportCSV()">

          </div>

          </div>
          <div class="tech-row" onclick="App.exportStatsCSV()">
            <span class="tech-ic">📈</span><div class="tech-info"><b>Отчёт по доходам</b><span>По авто · CSV</span></div><span class="tech-arr">⬇</span>
          </div>
          <div class="tech-row" onclick="App.exportDB()">
            <span class="tech-ic">💾</span><div class="tech-info"><b>Резервная копия базы</b><span>Полный экспорт · JSON</span></div><span class="tech-arr">⬇</span>
          </div>
        </div>

        <h3 class="muted-h">📥 Загрузка</h3>
        <div class="card tight">
          <label class="tech-row" style="cursor:pointer">
            <span class="tech-ic">📂</span><div class="tech-info"><b>Загрузить базу</b><span>Восстановить из JSON</span></div><span class="tech-arr">⬆</span>
            <input type="file" accept=".json" hidden onchange="App.importDB(event)">
          </label>
          <div class="tech-row tech-danger" onclick="App.resetDB()">
            <span class="tech-ic">🔄</span><div class="tech-info"><b>Сбросить к исходным данным</b><span>13 договоров из Excel</span></div>
          </div>
        </div>

        <h3 class="muted-h">📦 База данных</h3>
        <div class="card">
          <div class="db-grid">
            <div class="db-stat"><b>${db.fleet.length}</b><span>авто</span></div>
            <div class="db-stat"><b>${db.contracts.length}</b><span>всего дог.</span></div>
            <div class="db-stat"><b>${activeC}</b><span>активных</span></div>
            <div class="db-stat"><b>${money(totalRev)}</b><span>฿ доход</span></div>
          </div>
          <div class="db-ts">Обновлено: ${db.updatedAt?new Date(db.updatedAt).toLocaleString("ru-RU"):"—"}</div>
        </div>

        <h3 class="muted-h">☁️ Google Drive</h3>
        <div class="card">
          <div class="drive-info">
            <span class="drive-icon">📂</span>
            <div><b>Папка договоров</b>
              <a class="drive-link" href="https://drive.google.com/drive/folders/10MaOKbahMwi27r9Y02nl2cHVHt14hmY-" target="_blank">Договора → открыть ↗</a>
            </div>

          <label class="fld"><span>URL Google Apps Script</span>
            <input id="sync-url" value="${esc(syncUrl)}" placeholder="https://script.google.com/macros/s/…/exec"></label>

  function editCar(id) {
    const db = DB.get();
    const car = id ? db.fleet.find(c => c.id === id) : { make: "", plate: "", cls: "sedan", dayRate: 500, depositTHB: 5000, depositUSD: 200, fuelBarFirst: 750, fuelBarNext: 250, fuelBars: 8, hp: "", fuelAvg: "", insType: "standard", lastMileage: "", color: "", photo: "" };
    const isNew = !id;
    $("#app").innerHTML = `
      ${pageHeader(isNew ? "Новое авто" : "Изменить авто", "")}
      <div class="wrap">
        ${car.photo ? `<img src="${esc(car.photo)}" class="edit-car-photo" onerror="this.style.display='none'" alt="">` : ""}
        <div class="card">
          <label class="fld"><span>Марка и модель</span><input id="c-make" value="${esc(car.make)}" placeholder="MG 5"></label>
          <label class="fld"><span>Гос. номер</span><input id="c-plate" value="${esc(car.plate)}" placeholder="2956"></label>
          <label class="fld"><span>Цвет</span><input id="c-color" value="${esc(car.color||"")}" placeholder="Белый"></label>
          <label class="fld"><span>Класс</span>
            <select id="c-cls">
              <option value="sedan" ${car.cls === "sedan" ? "selected" : ""}>Седан</option>
              <option value="suv" ${car.cls === "suv" ? "selected" : ""}>SUV</option>
              <option value="pickup" ${car.cls === "pickup" ? "selected" : ""}>Пикап</option>
            </select></label>
          <label class="fld"><span>Тип страховки</span>
            <select id="c-ins">
              <option value="standard" ${(car.insType||"standard") === "standard" ? "selected" : ""}>Стандартная</option>
              <option value="full" ${car.insType === "full" ? "selected" : ""}>Полное покрытие</option>
            </select></label>
        </div>
        <div class="card">
          <label class="fld inline"><span>Цена за сутки</span><div class="moneyin"><input id="c-rate" type="number" value="${car.dayRate}"><span>฿</span></div></label>
          <label class="fld inline"><span>Залог</span><div class="moneyin"><input id="c-dep" type="number" value="${car.depositTHB}"><span>฿</span></div></label>
          <label class="fld inline"><span>Мощность, л.с.</span><div class="moneyin"><input id="c-hp" type="number" value="${car.hp||""}" placeholder="114"><span>л.с.</span></div></label>
          <label class="fld inline"><span>Расход, л/100км</span><div class="moneyin"><input id="c-fuel" type="number" step="0.1" value="${car.fuelAvg||""}" placeholder="6.8"><span>л</span></div></label>
          <label class="fld inline"><span>Пробег (последний)</span><div class="moneyin"><input id="c-km" type="number" value="${car.lastMileage||""}" placeholder="35000"><span>км</span></div></label>
        </div>
        <div class="card">
          <label class="fld"><span>Фото (URL изображения)</span><input id="c-photo" value="${esc(car.photo||"")}" placeholder="https://…" oninput="App.previewCarPhoto()"></label>
          <div id="photo-preview">${car.photo ? `<img src="${esc(car.photo)}" class="edit-car-photo" onerror="this.style.display='none'">` : ""}</div>
        </div>
        <button class="btn primary big" onclick="App.saveCar('${id || ""}')">Сохранить</button>
        <button class="btn ghost" onclick="App.go('fleet')">Отмена</button>
      </div>` + navbar() + `<div id="toasts"></div>`;

  function previewCarPhoto() {
    const url = $("#c-photo")?.value;
    const prev = $("#photo-preview");
    if (prev) prev.innerHTML = url ? `<img src="${url}" class="edit-car-photo" onerror="this.innerHTML='Изображение недоступно'">` : "";
  }
  function saveCar(id) {
    const data = {
      make: $("#c-make").value.trim(),
      plate: $("#c-plate").value.trim(),
      color: $("#c-color")?.value.trim() || "",
      cls: $("#c-cls").value,
      insType: $("#c-ins")?.value || "standard",
      dayRate: Number($("#c-rate").value) || 0,
      depositTHB: Number($("#c-dep").value) || 5000,
      depositUSD: 200,
      hp: Number($("#c-hp")?.value) || null,
      fuelAvg: Number($("#c-fuel")?.value) || null,
      lastMileage: Number($("#c-km")?.value) || null,
      photo: $("#c-photo")?.value.trim() || "",
    };
    if (!data.make) { toast("Укажите марку", "err"); return; }
    if (id) DB.updateCar(id, data);
    else DB.addCar({ ...data, fuelBarFirst: 750, fuelBarNext: 250, fuelBars: 8 });
    toast("Сохранено"); syncIfEnabled(); go("fleet");
  }
  function removeCar(id) {
    DB.deleteCar(id); toast("Удалено"); syncIfEnabled(); render();
  }

  function exportDB() {
    const blob = new Blob([DB.exportJSON()], { type: "application/json" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = `vedrive_backup_${new Date().toISOString().slice(0, 10)}.json`; a.click();
    toast("База выгружена");
  }
  function importDB(ev) {
    const file = ev.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      try { DB.importJSON(r.result); toast("База загружена"); render(); }
      catch (e) { toast("Ошибка: " + e.message, "err"); }
    };
    r.readAsText(file);
  }
  function resetDB() {
    DB.reset(); toast("База сброшена"); go("registry");
  }

  // ── Cloud ──────────────────────────────────────────────────────────────
  function saveSync() { DB.setSyncUrl($("#sync-url").value); toast("Адрес сохранён"); }
  async function cloudPush() {
    try { toast("Отправка…"); await DB.pushCloud(); toast("Выгружено в облако"); }
    catch (e) { toast("Ошибка: " + e.message, "err"); }
  }
  async function cloudPull() {
    // confirm removed for iframe compat
    try { toast("Загрузка…"); await DB.pullCloud(); toast("Загружено из облака"); render(); }
    catch (e) { toast("Ошибка: " + e.message, "err"); }
  }
  async function syncIfEnabled() {
    if (DB.getSyncUrl()) { try { await DB.pushCloud(); } catch (e) { /* silent */ } }
  }

  async function saveToDrive(num) {
    if (!DB.getSyncUrl()) {
      toast("Для Google Drive нужен URL Apps Script в разделе «Авто → Синхронизация»", "err");
      return;
    }
    const c = DB.get().contracts.find(x => x.num === num);
    toast("Отправляю в Google Drive…");
    try {
      const htmlContent = DOC.buildDOCHtml(c);
      const result = await DB.saveDriveDoc(c, htmlContent);
      toast("✓ Договор № " + num + " сохранён в Google Drive");
    } catch(e) {
      toast("Ошибка Drive: " + e.message, "err");
    }
  }

  // ── Shared header helpers ─────────────────────────────────────────────────
  function wizHeader(step, title) {
    return `
      <header class="hero compact">
        <button class="hero-back" onclick="App.go('home')">✕</button>
        <div class="brand sm">VEDRIVE</div>
      </header>
      <div class="wrap">
        <div class="stepline">
          ${[1, 2, 3, 4, 5].map(n => `<span class="dot ${n < step ? "done" : n === step ? "active" : ""}">${n < step ? "✓" : n}</span>${n < 5 ? '<span class="line ' + (n < step ? "done" : "") + '"></span>' : ""}`).join("")}
        </div>
        <h2 class="step-h">${title}</h2>
      </div>`;
  }
  function pageHeader(title, sub) {
    return `<header class="hero compact"><div class="brand sm">${esc(title)}</div>${sub ? `<div class="hero-sub xs">${esc(sub)}</div>` : ""}</header>`;
  }

  function clsLabel(c) { return { sedan: "седан", suv: "SUV", pickup: "пикап" }[c] || c; }

  // ── Render dispatcher ─────────────────────────────────────────────────────
  function render() {
    const _wiz = new Set(["pick-car","pricing","driver","review"]);
    document.body.classList.toggle("wizard-mode", _wiz.has(view));
    const views = {
      home: viewHome, "pick-car": viewPickCar, pricing: viewPricing,
      driver: viewDriver, review: viewReview,
      registry: viewRegistry, schedule: viewSchedule, stats: viewStats, tech: viewTech, fleet: viewTech, fleet: viewFleet,
    };
    const fn = views[view] || viewHome;
    const showNav = ["home", "registry", "schedule", "stats", "tech", "fleet"].includes(view);
    $("#app").innerHTML = fn() + (showNav ? navbar() : navbar()) + `<div id="toasts"></div>`;

    if (view === "home") {
      const upd = () => { const s = $("#w-start").value, e = $("#w-end").value;
        if (s && e && new Date(e) > new Date(s)) $("#w-days").textContent = `${daysBetween(s, e)} дн.`; else $("#w-days").textContent = ""; };
      $("#w-start")?.addEventListener("input", upd);
      $("#w-end")?.addEventListener("input", upd);
      upd();
    }
  }

  function init() {
    DB.load();
    render();
  }

  return {
    init, go, render,
    findCars, chooseCar, toggleOpt, setOpt, recalc, confirmPricing, confirmDriver,
    createContract, dlDoc, dlPdf, previewContract, saveToDrive,
    setRegSearch, openContract, cancelContract, restoreContract, previewCarPhoto, recalcMileage,
    showBookingPopup, exportCSV, exportScheduleCSV, exportStatsCSV, exportDB, importDB, resetDB,
    editCar, saveCar, removeCar,
    saveSync, cloudPush, cloudPull,
  };
})();

</script>
